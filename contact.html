<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://cdn.kb.institute/eto-2026/IQCOL/Logo/Square_Dark_Background_2026_500.png">
    <title>Contact Us | IQCOL 2026</title>
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .section-header { margin: 80px 0 60px; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 100px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        .contact-info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .info-card-link { text-decoration: none; color: inherit; display: block; }
        .info-card {
            padding: 50px 30px;
            background: rgba(5, 0, 15, 0.8);
            border: 1px solid var(--border-bright);
            border-radius: 4px;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            height: 100%;
            box-sizing: border-box;
        }
        .info-card-link:hover .info-card {
            transform: translateY(-8px);
            border-color: var(--lavender-bright);
            background: rgba(30, 15, 50, 0.95);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
        .info-card i { color: var(--lavender-bright); margin-bottom: 20px; }
        .info-card h3 {
            color: var(--lavender-bright);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 12px;
            font-size: 1rem;
        }
        .info-card p { color: #e0e0e0; font-size: 0.9rem; margin: 0; line-height: 1.6; }
        .info-card .contact-value {
            color: #fff;
            font-size: 0.95rem;
            margin-top: 10px;
            font-weight: 600;
            word-break: break-all;
        }

        .extra-section { margin-top: 80px; text-align: center; }
        .extra-section h3 { color: var(--lavender-bright); text-transform: uppercase; letter-spacing: 4px; font-size: 1.2rem; margin-bottom: 20px; }
        .extra-section p { color: #e0e0e0; font-size: 0.93rem; max-width: 600px; margin: 0 auto 30px; line-height: 1.7; }
        .social-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .social-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; border-radius: 50px; text-decoration: none;
            font-size: 0.82rem; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; transition: all 0.3s;
            border: 1px solid var(--border-bright); color: var(--lavender-bright);
            background: rgba(179, 136, 255, 0.08);
        }
        .social-btn:hover { background: rgba(98, 0, 234, 0.15); border-color: var(--node-blue); color: #fff; transform: translateY(-2px); }

        @media (max-width: 900px) { .contact-info-grid { grid-template-columns: 1fr; } }
        @media (max-width: 600px) { .container { padding: 0 15px 80px; } }
        footer {
            width: 100%;
            margin-top: auto;
            padding: 0 20px;
            box-sizing: border-box;
            background: var(--glass-frost);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .footer-inner { max-width: 1200px; margin: 0 auto; width: 100%; }
    </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="page-content">
    <div class="section-header reveal" style="text-align:center;padding:0 20px;">
        <h2>Contact Us</h2>
    </div>

    <div class="container">
        <div class="contact-info-grid">
            <a href="mailto:2026@iqcol.org?subject=General%20Inquiry%20-%20IQCOL%202026" class="info-card-link reveal">
                <div class="info-card">
                    <i data-lucide="mail" style="width:40px;height:40px;"></i>
                    <h3>General Inquiries</h3>
                    <p>For all general questions about IQCOL 2026.</p>
                    <div class="contact-value">2026@iqcol.org</div>
                </div>
            </a>
            <a href="mailto:2026@iqcol.org?subject=Registration%20Inquiry%20-%20IQCOL%202026" class="info-card-link reveal">
                <div class="info-card">
                    <i data-lucide="user-plus" style="width:40px;height:40px;"></i>
                    <h3>Registration Support</h3>
                    <p>Questions about team registration, fees, or eligibility.</p>
                    <div class="contact-value">2026@iqcol.org</div>
                </div>
            </a>
            <a href="mailto:partnerships@kb.institute?subject=IQCOL%202026%20Partnership%20Inquiry" class="info-card-link reveal">
                <div class="info-card">
                    <i data-lucide="handshake" style="width:40px;height:40px;"></i>
                    <h3>Partnerships &amp; Sponsors</h3>
                    <p>Interested in becoming a partner or sponsor of IQCOL 2026?</p>
                    <div class="contact-value">partnerships@kb.institute</div>
                </div>
            </a>
        </div>
    </div>
</div>

<script src="js/nav.js"></script>
<script src="js/shared.js"></script>
</body>
</html>
